name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build .NET API
        run: |
          cd API
          dotnet publish -c Release -o ../publish/api --self-contained false

      - name: Build Frontend
        run: |
          cd Front
          npm install
          npm run build

      - name: Prepare Frontend target on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/my-app
            sudo find /var/www/my-app -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Deploy Frontend assets to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "Front/dist/*"
          target: "/var/www/my-app"
          strip_components: 2

      - name: Prepare Backend target on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo systemctl stop my-api.service || true
            sudo mkdir -p /var/www/my-api
            sudo find /var/www/my-api -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Deploy Backend binary to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "publish/api/*"
          target: "/var/www/my-api"
          strip_components: 2

      - name: Fix permissions and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Frontend: ensure Nginx can read static files.
            sudo chown -R www-data:www-data /var/www/my-app
            sudo find /var/www/my-app -type d -exec chmod 755 {} \;
            sudo find /var/www/my-app -type f -exec chmod 644 {} \;

            # Backend: service runs as www-data in this project.
            sudo chown -R www-data:www-data /var/www/my-api
            sudo find /var/www/my-api -type d -exec chmod 755 {} \;
            sudo find /var/www/my-api -type f -exec chmod 644 {} \;

            sudo systemctl start my-api.service
            sudo systemctl restart nginx